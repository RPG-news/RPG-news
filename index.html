<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG News - أخبار تحديثات الألعاب الرسمية</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tahoma', 'Arial', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 40px 0;
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 3em;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .subtitle {
            color: #ccc;
            margin-top: 10px;
        }

        .search-section {
            text-align: center;
            margin: 30px 0;
        }

        .search-box {
            width: 100%;
            max-width: 600px;
            padding: 15px 25px;
            font-size: 18px;
            border: none;
            border-radius: 50px;
            background: rgba(255,255,255,0.1);
            color: white;
            outline: none;
            transition: all 0.3s;
        }

        .search-box:focus {
            background: rgba(255,255,255,0.2);
            box-shadow: 0 0 20px rgba(78,205,196,0.3);
        }

        .search-box::placeholder {
            color: #aaa;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .game-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }

        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            background: rgba(255,255,255,0.15);
        }

        .game-title {
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 15px;
            color: #4ecdc4;
        }

        .update-item {
            background: rgba(0,0,0,0.3);
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border-right: 3px solid #4ecdc4;
        }

        .update-version {
            font-weight: bold;
            color: #ff6b6b;
        }

        .update-date {
            font-size: 0.8em;
            color: #aaa;
            margin-top: 5px;
        }

        .no-results {
            text-align: center;
            padding: 50px;
            font-size: 1.2em;
            color: #ccc;
        }

        footer {
            text-align: center;
            margin-top: 50px;
            padding: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            color: #aaa;
        }

        .official-badge {
            display: inline-block;
            background: #4ecdc4;
            color: #0f0c29;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.7em;
            margin-left: 10px;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            .games-grid {
                grid-template-columns: 1fr;
            }
            h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎮 RPG News</h1>
            <p class="subtitle">أخبار وتحديثات الألعاب الرسمية - أكثر من 15 لعبة محدثة باستمرار</p>
        </header>

        <div class="search-section">
            <input type="text" id="searchInput" class="search-box" placeholder="🔍 ابحث عن لعبة... مثال: Fortnite, GTA V, Minecraft, PUBG, Elden Ring">
        </div>

        <div id="gamesContainer" class="games-grid"></div>
        <footer>
            <p>✅ جميع التحديثات من المصادر الرسمية (مواقع المطورين، Steam، Epic Games)</p>
            <p style="margin-top: 10px;">📅 آخر تحديث: مايو 2026 | RPG News - مصدرك الموثوق للتحديثات الرسمية</p>
        </footer>
    </div>

    <script>

                ]
            },
            "hogwarts legacy": {
                name: "🪄 Hogwarts Legacy",
                officialSite: "https://www.hogwartslegacy.com/ar/",
                updates: [
                    { version: "1.09", date: "2026-05-07", description: "✨ مهمات جانبية جديدة" },
                    { version: "1.08", date: "2026-04-20", description: "🐉 إضافة مناطق جديدة في الخريطة" }
                ]
            },
            "starfield": {
                name: "🚀 Starfield",
                officialSite: "https://bethesda.net/ar/game/starfield",
                updates: [
                    { version: "1.11.36", date: "2026-05-15", description: "🪐 توسعة جديدة: Shattered Space" },
                    { version: "1.11.33", date: "2026-05-01", description: "🔧 إصلاح مشاكل الأداء" }
                ]
            }
        };

        function displayGames(searchTerm = "") {
            const container = document.getElementById('gamesContainer');
            container.innerHTML = "";
            
            let filteredGames = Object.keys(gamesDatabase);
            
            if (searchTerm.trim() !== "") {
                filteredGames = filteredGames.filter(gameKey => 
                    gamesDatabase[gameKey].name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    gameKey.toLowerCase().includes(searchTerm.toLowerCase())
                );
            }
            
            if (filteredGames.length === 0) {
                container.innerHTML = `<div class="no-results">😕 لا توجد ألعاب تطابق "${searchTerm}"<br><br>💡 الألعاب المتوفرة: Fortnite, GTA V, Minecraft, Valorant, Call of Duty, Overwatch 2, League of Legends, PUBG, Elden Ring, God of War, The Last of Us, Spider-Man 2, Resident Evil 4, Final Fantasy XVI, Hogwarts Legacy, Starfield</div>`;
                return;
            }
            
            filteredGames.forEach(gameKey => {
                const game = gamesDatabase[gameKey];
                const gameCard = document.createElement('div');
                gameCard.className = 'game-card';
                
                let updatesHTML = '';
                game.updates.forEach(update => {
                    updatesHTML += `
                        <div class="update-item">
                            <div><span class="update-version">${update.version}</span> <span class="official-badge">رسمي</span></div>
                            <div>📝 ${update.description}</div>
                            <div class="update-date">📅 ${update.date}</div>
                        </div>
                    `;
                });
                
                gameCard.innerHTML = `
                    <div class="game-title">
                        ${game.name}
                        <a href="${game.officialSite}" target="_blank" style="font-size: 12px; color: #4ecdc4; text-decoration: none;"> 🔗 الموقع الرسمي</a>
                    </div>
                    ${updatesHTML}
                `;
                
                container.appendChild(gameCard);
            });
        }
        
        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('input', (e) => {
            displayGames(e.target.value);
        });
        
        displayGames();
    </script>
</body>
</html>
